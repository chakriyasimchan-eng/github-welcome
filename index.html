<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Homework</title>
    <link rel="icon" href="mountain.jpg">
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Open+Sans:ital,wght@0,300..800;1,300..800&display=swap" rel="stylesheet">
</head>
<body>
    <div class="header" >
        <h1>Student Practice Webpage</h1>
        <p>HTML + CSS Practice (Form + Table Advanced)</p>
    </div>

    <div class="container">
        <h2>Image Section</h2>
        <img src="mountain.jpg" alt="Mountain Picture" style="height: 250px; width: 350px; border-radius: 10px;">
    </div>

    <div class="container">
        <table class="student-table"  style="border:1px solid rgb(226, 226, 226); width:100%; border-collapse:collapse;">
            <h2>Advanced Table</h2>
            <tr>
                <th rowspan="2">Name</th>
                <th colspan="2">Score</th>
                <th rowspan="2">Grade</th>
            </tr>
            <tr>
                <th>Math</th>
                <th>CS</th>
            </tr>
            <tr>
                <td>Alice</td>
                <td>90</td>
                <td>95</td>
                <td>A</td>
            </tr>
            <tr>
                <td>Bob</td>
                <td>80</td>
                <td>85</td>
                <td>B</td>
            </tr>
        </table>
    </div>

    <div class="container">
            <form >
                <h2>Form 1: Basic Info</h2>
                <label for="user-fullname">Full Name<span class="required-symbol">*</span></label>
                <br>

                <input class="form-box" type="text" id="user-fullname" required>
                <br><br>

                <label for="user-email">Email<span class="required-symbol">*</span></label>
                <br>

                <input class="form-box" type="email" id="user-email" required>
                <br><br>

                <label for="user-password">Password<span class="required-symbol">*</span></label>
                <br>

                <input class="form-box" type="password" id="user-password" required>
                <br><br>

                <label for="user-file">Upload File</label>
                <br>
                <input class="form-box" type="file" id="user-file">
                <br><br>

                <input class="form-botton" type="submit" value="Submit">
                <input class="form-botton" type="reset" value="Reset">

            </form>
    </div>
    <div class="container">
        <div class="survey-form-card">
            <form>
                <h2>Form 2: Survey</h2>
                <span>Choose Course<span class="required-symbol">*</span></span>
                <br>
                <select class="form-box" id="course-selection">
                    <option value="0">-- Select --</option>
                    <option value="1">Graphic Design</option>
                    <option value="2">Computer Science</option>
                </select>
                <br><br>
                
                <span>Gender:</span>
                <br>
                <input type="radio" name="student-gender" id="gender-male">
                <label for="gender-male">Male</label>
                <input type="radio" name="student-gender" id="gender-female">
                <label for="gender-female">Female</label>
                <br><br>

                <span>Skill:</span>
                <br>
                <input type="checkbox" id="skill-html">
                <label for="skill-html">HTML</label>
                <input type="checkbox" id="skill-css">
                <label for="skill-css">CSS</label>
                <input type="checkbox" id="skill-javascript">
                <label for="skill-javascript">JS</label>
                <br><br>
                <span>Phone<span class="required-symbol">*</span> </span>
                <br>
                <input class="form-box" type="number" name="phone-input" id="student-phone" required>
                <br><br>
                <span>Message</span>
                <br>
                <textarea class="form-box" id="student-message"></textarea>
                <br><br>
                <input class="form-botton" type="submit" value="Send">

            </form>
        </div>
    </div>

</body>
</html>
